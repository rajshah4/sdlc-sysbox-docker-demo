<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Sysbox SDLC Petstore</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="shell">
      <section class="toolbar" aria-label="Pet search controls">
        <p class="eyebrow">OpenHands Enterprise · Sysbox</p>
        <h1>Containerized Petstore</h1>
        <p>API + PostgreSQL + Redis + browser verification, launched inside the agent sandbox.</p>
        <label>
          Pet name
          <input id="query" type="search" value="">
        </label>
        <label>
          Species
          <select id="species">
            <option value="">Any</option>
            <option>cat</option>
            <option>dog</option>
            <option>rabbit</option>
          </select>
        </label>
        <button id="search-button">Find Pets</button>
      </section>
      <section>
        <h2>Available Pets</h2>
        <p id="message" role="status" aria-live="polite"></p>
        <ul id="results" class="results"></ul>
      </section>
    </main>
    <script src="app.js"></script>
  </body>
</html>
